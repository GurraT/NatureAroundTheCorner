<!DOCTYPE html>
<html>
<head>
  <title>Wildlife Travel</title>
  <link rel="stylesheet" href="css\style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>

  <header class="hero">
    <h1>Wildlife Travel</h1>
    <p>Explore the wild. Discover amazing animals.</p>
  </header>

  <section>
    
    <h2>Top Destinations</h2>

    <div class="card-container">

      <div class="card">
        <h3>Serengeti</h3>
        <p>Lions, elephants, сафари</p>
      </div>

      <div class="card">
        <h3>Svalbard</h3>
        <p>Polar bears, Arctic adventure</p>
      </div>

      <div class="card">
        <h3>Amazon</h3>
        <p>Jungle wildlife, exotic species</p>
      </div>
    </div>
  </section>
    <section>
<h2>Wildlife Map</h2>
<div id="map"><h2>Animals in this location</h2>
<div id="animals"></div></div>
  </section>
  
<script>
  const wildlifeData = {
  serengeti: [
    {
      name: "Lion",
      image: "https://upload.wikimedia.org/wikipedia/commons/7/73/Lion_waiting_in_Namibia.jpg"
    },
    {
      name: "Elephant",
      image: "https://upload.wikimedia.org/wikipedia/commons/3/37/African_Bush_Elephant.jpg"
    }
  ],

  svalbard: [
    {
      name: "Polar Bear",
      image: "https://upload.wikimedia.org/wikipedia/commons/e/e7/Polar_Bear_-_Alaska.jpg"
    }
  ],

  amazon: [
    {
      name: "Jaguar",
      image: "https://upload.wikimedia.org/wikipedia/commons/0/0a/Panthera_onca_at_the_Toronto_Zoo.jpg"
    }
  ]
};
  function showAnimals(location) {
  const container = document.getElementById("animals");
  container.innerHTML = "";

  wildlifeData[location].forEach(animal => {
    const card = document.createElement("div");
    card.className = "animal-card";

    card.innerHTML = `
      <img src="${animal.image}">
      <h3>${animal.name}</h3>
    `;

    container.appendChild(card);
  });
}
  // Create map centered on world
  const map = L.map('map').setView([20, 0], 2);

  // Add map tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // Add locations
L.marker([-2.333, 34.833]).addTo(map)
  .bindPopup("Serengeti")
  .on("click", () => showAnimals("serengeti"));

L.marker([78.223, 15.646]).addTo(map)
  .bindPopup("Svalbard")
  .on("click", () => showAnimals("svalbard"));

L.marker([-3.465, -62.215]).addTo(map)
  .bindPopup("Amazon")
  .on("click", () => showAnimals("amazon"));

</script>
</body>
</html>
