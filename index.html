<!DOCTYPE html>
<html>
<head>
  <title>Wildlife Travel</title>
  <link rel="stylesheet" href="css\style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>

  <header class="hero">
    <h1>Wildlife Travel</h1>
    <p>Explore the wild. Discover amazing animals.</p>
  </header>

  <section>
    <h2>Wildlife Map</h2>
<div id="map"></div>
    
    <h2>Top Destinations</h2>

    <div class="card-container">

      <div class="card">
        <h3>Serengeti</h3>
        <p>Lions, elephants, сафари</p>
      </div>

      <div class="card">
        <h3>Svalbard</h3>
        <p>Polar bears, Arctic adventure</p>
      </div>

      <div class="card">
        <h3>Amazon</h3>
        <p>Jungle wildlife, exotic species</p>
      </div>

    </div>
  </section>

</body>
</html>
