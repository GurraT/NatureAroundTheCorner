<!DOCTYPE html>
<html>
<head>
  <title>Wildlife Travel</title>
  <link rel="stylesheet" href="css\style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>

  <header class="hero">
    <h1>Wildlife Travel</h1>
    <p>Explore the wild. Discover amazing animals.</p>
  </header>

  <section>
    
    <h2>Top Destinations</h2>

    <div class="card-container">

      <div class="card">
        <h3>Serengeti</h3>
        <p>Lions, elephants, сафари</p>
      </div>

      <div class="card">
        <h3>Svalbard</h3>
        <p>Polar bears, Arctic adventure</p>
      </div>

      <div class="card">
        <h3>Amazon</h3>
        <p>Jungle wildlife, exotic species</p>
      </div>
    </div>
  </section>
    <section>
<h2>Wildlife Map</h2>
<div id="map"></div>
<h2>Animals in this location</h2>
<div id="animals"></div>
  </section>
  
<script>
  // Create map centered on world
  const map = L.map('map').setView([20, 0], 2);

  // Add map tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // Add locations
  L.marker([-2.333, 34.833]).addTo(map)
    .bindPopup("<b>Serengeti</b><br>Lions, Elephants");

  L.marker([78.223, 15.646]).addTo(map)
    .bindPopup("Svalbard - Polar Bears");

  L.marker([-3.465, -62.215]).addTo(map)
    .bindPopup("Amazon - Jungle Wildlife");

</script>
</body>
</html>
